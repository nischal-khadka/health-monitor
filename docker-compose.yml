version: "3.9"

services:
  db:
    image: postgres:18
    restart: always
    environment:
      POSTGRES_DB: health_monitor
      POSTGRES_USER: health_user
      POSTGRES_PASSWORD: health_pass123
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg2://health_user:health_pass123@db/health_monitor
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  db_data:
